packages:
  - ./common
  - ./core
  - ./drivers
  - ./examples
verifyDepsBeforeRun: false
allowBuilds:
  '@google/genai': true
  esbuild: true
  protobufjs: true
blockExoticSubdeps: true
minimumReleaseAge: 4320 # 3 days in minutes, minimumReleaseAge protects against supply chain attacks.
minimumReleaseAgeStrict: true
minimumReleaseAgeExclude:
  - '@vertesia/*'
  - '@llumiverse/*'
  # Renovate security update: undici@7.28.0
  - undici@7.28.0
  # Additional excludes, due to CVEs etc.
  # Security updates for Dependabot alerts #81-#84.
  - brace-expansion@5.0.7
  - fast-uri@3.1.4
  - protobufjs@7.6.5
catalog:
  "@types/node": "^24.13.3"
  google-auth-library: "^10.9.0"
overrides:
  # ============================
  # Special Overrides
  # ============================
  # We have these for more than simple CVE fixes, but may also do that. Or have complex requirements to track.

  # Pin single google-auth-library
  google-auth-library: 'catalog:'

  # Force Node 24 types.
  "@types/node": 'catalog:'

  # ============================
  # Standard CVE overrides
  # ============================
  # Dependabot alerts #77/#78: Vite dev-server Windows path disclosure issues.
  vite: ^8.0.16
  "brace-expansion@>=3.0.0 <5.0.7": 5.0.7
  "fast-uri@>=3.0.0 <3.1.4": 3.1.4
  protobufjs@<=7.6.4: 7.6.5
