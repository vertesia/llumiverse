name: publish-npm-packages

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release Type
        required: true
        type: choice
        options:
          - snapshot
          - release
        default: snapshot
      bump_type:
        description: Version Bump
        required: true
        type: choice
        options:
          - keep
          - patch
          - minor
        default: keep
      dry_run:
        description: Dry Run
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish NPM packages ${{ inputs.dry_run && '[dry-run]' || '' }}[${{ inputs.release_type }}/${{ inputs.bump_type }}]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC between GitHub and NPM
      contents: write  # Required to push version changes
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }} # Use deploy key to bypass branch protection rules
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: "pnpm"

      # Ensure npm 11.5.1 or later is installed
      - name: Update npm
        run: npm install -g npm@latest
      - run: npm --version

      - run: pnpm install

      - name: Publish all packages
        run: |
          ./.github/bin/publish-all-packages.sh \
              --ref "${GITHUB_REF_NAME}" \
              --release-type "${{ inputs.release_type }}" \
              --bump-type "${{ inputs.bump_type }}" \
              --dry-run "${{ inputs.dry_run }}"
