name: (lint) lint codebase

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint codebase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@main
        with:
          node-version: 22.22.2
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
