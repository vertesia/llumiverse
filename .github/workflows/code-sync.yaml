name: (sync) preview -> main

on:
  push:
    branches:
      - preview
  workflow_dispatch: # mainly for testing
    inputs:
      from_branch:
        description: "From which branch to sync code with main"
        required: true
        default: "preview"
      from_sha:
        description: "From which commit SHA to sync code with main"
        required: false
        default: ""

# Serialize concurrent runs so two simultaneous pushes don't race on the
# shared temporary branch or step on each other's PR creation.
concurrency:
  group: code-sync-${{ inputs.from_branch || github.ref_name }}
  cancel-in-progress: false

env:
  FROM_BRANCH: ${{ inputs.from_branch || github.ref_name }}

permissions:
  contents: read

jobs:
  sync:
    name: Sync code from preview to main
    runs-on: ubuntu-latest
    permissions:
      contents: write # required for pushing the temporary sync branch
      pull-requests: write # required for creating the conflict-resolution PR
    outputs:
      is_merged: ${{ steps.sync.outputs.IS_MERGED }}
      pr_number: ${{ steps.sync.outputs.PR_NUMBER }}
      pr_url: ${{ steps.sync.outputs.PR_URL }}
      should_cleanup: ${{ steps.sync.outputs.SHOULD_CLEANUP }}
      sync_ref: ${{ steps.sync.outputs.SYNC_REF }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # Fetch all because we need to access info from different branches
          fetch-tags: false
          persist-credentials: false

      - name: Code Sync
        id: sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          export SOURCE_REF="${FROM_BRANCH}"
          export SOURCE_SHA="$(git rev-parse "origin/${FROM_BRANCH}")"
          export SOURCE_MSG="$(git log --format="%cd: %s by %an" --date=short -1 $SOURCE_SHA)"

          export TARGET_REF="main"
          export TARGET_SHA="$(git rev-parse origin/main)"
          export TARGET_MSG="$(git log --format="%cd: %s by %an" --date=short -1 $TARGET_SHA)"

          export TEMP_BRANCH="sync-${SOURCE_SHA::7}"

          cat << EOF >> $GITHUB_STEP_SUMMARY
          Type   | Item      | Value
          :----- | :-------- | :---------------
          Source | commit    | ${SOURCE_MSG}
          Source | ref       | \`${SOURCE_REF}\` ([\`${SOURCE_SHA}\`](https://github.com/${GITHUB_REPOSITORY}/commit/${SOURCE_SHA}))
          Target | commit    | ${TARGET_MSG}
          Target | ref       | \`${TARGET_REF}\` ([\`${TARGET_SHA}\`](https://github.com/${GITHUB_REPOSITORY}/commit/${TARGET_SHA}))
          Other  | branch    | \`${TEMP_BRANCH}\`
          EOF

          # don't exit if the script fails, we will handle the error manually
          # see also: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#jobsjob_idstepsshell
          set +e
          bash .github/bin/sync-code.sh
          is_sync_result=$?
          set -e

          if [ $is_sync_result -eq 0 ]; then
            echo "Code sync successful. Pushing changes to the repository."
            git push origin $TEMP_BRANCH

            echo "PR_NUMBER=0" >> $GITHUB_OUTPUT
            echo "SHOULD_CLEANUP=true" >> $GITHUB_OUTPUT
            echo "SYNC_REF=${TEMP_BRANCH}" >> $GITHUB_OUTPUT
            echo "IS_MERGED=true" >> $GITHUB_OUTPUT
          elif [ $is_sync_result -eq 2 ]; then
            echo "Code sync failed because merge conflicts cannot be resolved automatically."
            echo "Preparing a PR and asking the author [${GITHUB_ACTOR}] to handle the synchronization..."

            git push origin $TEMP_BRANCH

            body=$(cat << EOF
          The code sync from \`${SOURCE_REF}\` to \`${TARGET_REF}\` failed (see [GitHub Actions run](https://github.com/vertesia/llumiverse/actions/runs/${GITHUB_RUN_ID:-0})). Please resolve the conflicts and push the changes to the \`${TEMP_BRANCH}\` branch. Here are the recommended steps to handle the conflicts in your terminal:

          \`\`\`sh
          # fetch the Git references
          git fetch origin

          # checkout the current branch
          git checkout ${TEMP_BRANCH}

          # merge the 'main' branch into the current branch
          git merge origin/main

          # resolve the conflicts
          \`\`\`

          Once the conflicts are resolved, you can push the changes to GitHub. Please wait until the CI checks pass. Then, you can review the PR and merge it. :warning: Important: when merging the PR, please use the option **"Create a merge commit"** to preserve the conflict resolution history.
          EOF
          )

            author_login=$(gh api repos/vertesia/llumiverse/commits/${SOURCE_SHA} --jq '.author.login // empty' || true)

            pr_url=$(gh pr create \
              --title "Merge branch \`${SOURCE_REF}\` (${SOURCE_SHA::7}) to \`${TARGET_REF}\`" \
              --body "$body" \
              --base main \
              --head $TEMP_BRANCH \
              --label "workflow:code-sync")
            pr_number=$(echo "$pr_url" | grep -oP '(?<=pull/)\d+')

            if [ -n "$author_login" ]; then
              gh pr edit "$pr_number" --add-assignee "$author_login"
            fi

            echo "PR_NUMBER=${pr_number}" >> $GITHUB_OUTPUT
            echo "PR_URL=${pr_url}" >> $GITHUB_OUTPUT
            echo "SHOULD_CLEANUP=false" >> $GITHUB_OUTPUT
            echo "SYNC_REF=${TEMP_BRANCH}" >> $GITHUB_OUTPUT
            echo "IS_MERGED=false" >> $GITHUB_OUTPUT

            # Don't exit with an error, we want to continue the workflow with a PR
          else
            echo "Code sync failed with an unexpected error. Please check the logs for more details." >&2

            echo "PR_NUMBER=0" >> $GITHUB_OUTPUT
            echo "SHOULD_CLEANUP=true" >> $GITHUB_OUTPUT
            echo "SYNC_REF=${TEMP_BRANCH}" >> $GITHUB_OUTPUT
            echo "IS_MERGED=false" >> $GITHUB_OUTPUT

            exit 1
          fi

  # TODO: Add tests for the synced code

  push:
    name: Fast-forward main with the synced branch
    needs:
      - sync
    if: ${{ needs.sync.outputs.is_merged == 'true' }}
    runs-on: ubuntu-latest
    # Scopes DEPLOY_KEY to a dedicated environment (zizmor: secrets-outside-env).
    environment: build
    permissions:
      contents: write # required for fast-forwarding main with the synced branch
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # Fetch all because we need to access info from different branches
          fetch-tags: false
          ref: ${{ needs.sync.outputs.sync_ref }}
          ssh-key: ${{ secrets.DEPLOY_KEY }} # Use deploy key to bypass branch protection rules
          persist-credentials: false

      - name: Push changes to main branch
        env:
          NEEDS_SYNC_OUTPUTS_SYNC_REF: ${{ needs.sync.outputs.sync_ref }}
        run: |
          set -x

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git checkout main

          # note: --ff-only ensures that the merge will only succeed if it can be fast-forwarded. This avoids creating
          # a merge commit and keeps the history clean. If failed, user should trigger the workflow again, or resolving
          # conflicts and then sync manually.
          git merge --ff-only --no-edit "${NEEDS_SYNC_OUTPUTS_SYNC_REF}"

          git push origin main

  fast_forward_failure:
    name: Open PR when fast-forward is not possible
    needs:
      - sync
      - push
    if: ${{ always() && needs.sync.outputs.is_merged == 'true' && needs.push.result == 'failure' }}
    runs-on: ubuntu-latest
    # Scopes the cross-repo dispatch token to a dedicated environment.
    environment: build
    permissions:
      contents: read # required for checking out the repository
      pull-requests: write # required for opening the fast-forward-failure PR
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: false
          persist-credentials: false

      - name: Create PR for fast-forward failure
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEEDS_SYNC_OUTPUTS_SYNC_REF: ${{ needs.sync.outputs.sync_ref }}
        run: |
          TEMP_BRANCH="${NEEDS_SYNC_OUTPUTS_SYNC_REF}"

          body=$(cat << EOF
          The code sync from \`${FROM_BRANCH}\` to \`main\` succeeded, but \`main\` could not be fast-forwarded with \`${TEMP_BRANCH}\` (see [GitHub Actions run](https://github.com/vertesia/llumiverse/actions/runs/${GITHUB_RUN_ID:-0})). This usually means \`main\` moved after the sync branch was created.

          Please review and merge this PR manually. If GitHub reports conflicts, resolve them on \`${TEMP_BRANCH}\` and push the result before merging.
          EOF
          )

          existing_pr=$(gh pr list \
            --head "$TEMP_BRANCH" \
            --base main \
            --state open \
            --limit 1 \
            --json number,url \
            --jq 'if length > 0 then "\(.[0].number)::\(.[0].url)" else "" end' || true)

          if [ -n "$existing_pr" ]; then
            pr_number="${existing_pr%%::*}"
            pr_url="${existing_pr#*::}"

            gh pr edit "$pr_number" \
              --title "Merge branch \`${FROM_BRANCH}\` (${TEMP_BRANCH#sync-}) to \`main\` [fast-forward failed]" \
              --body "$body" \
              --add-label "workflow:code-sync"
          else
            pr_url=$(gh pr create \
              --title "Merge branch \`${FROM_BRANCH}\` (${TEMP_BRANCH#sync-}) to \`main\` [fast-forward failed]" \
              --body "$body" \
              --base main \
              --head "$TEMP_BRANCH" \
              --label "workflow:code-sync")
            pr_number=$(echo "$pr_url" | grep -oP '(?<=pull/)\d+')
          fi

          echo "PR_NUMBER=${pr_number}" >> $GITHUB_OUTPUT
          echo "PR_URL=${pr_url}" >> $GITHUB_OUTPUT

      - name: Assign PR to author
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STEPS_CREATE_PR_OUTPUTS_PR_NUMBER: ${{ steps.create_pr.outputs.PR_NUMBER }}
        run: |
          if [ "${GITHUB_ACTOR}" != "github-actions[bot]" ]; then
            gh pr edit "${STEPS_CREATE_PR_OUTPUTS_PR_NUMBER}" --add-assignee "${GITHUB_ACTOR}"
          fi

      - name: Notify studio for Slack notification
        if: ${{ github.actor != 'github-actions[bot]' }}
        env:
          STUDIO_DISPATCH_TOKEN: ${{ secrets.STUDIO_DISPATCH_TOKEN }}
          STEPS_CREATE_PR_OUTPUTS_PR_URL: ${{ steps.create_pr.outputs.PR_URL }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${STUDIO_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --fail-with-body \
            https://api.github.com/repos/vertesia/studio/dispatches \
            -d "$(jq -nc \
              --arg actor "${GITHUB_ACTOR}" \
              --arg url "${STEPS_CREATE_PR_OUTPUTS_PR_URL}" \
              '{event_type: "developer-notification", client_payload: {github_login: $actor, message: ("Your changes from `preview` synced cleanly in vertesia/llumiverse, but `main` could not be fast-forwarded. Please review this PR: " + $url)}}')"

  notify:
    name: Notify developer of successful sync
    runs-on: ubuntu-latest
    needs:
      - push
    if: ${{ needs.push.result == 'success' && github.actor != 'github-actions[bot]' }}
    # Scopes the cross-repo dispatch token to a dedicated environment.
    environment: build
    steps:
      - name: Notify studio
        env:
          STUDIO_DISPATCH_TOKEN: ${{ secrets.STUDIO_DISPATCH_TOKEN }}
          ACTION_RUN_URL: https://github.com/vertesia/llumiverse/actions/runs/${{ github.run_id }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${STUDIO_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --fail-with-body \
            https://api.github.com/repos/vertesia/studio/dispatches \
            -d "$(jq -nc \
              --arg actor "${GITHUB_ACTOR}" \
              --arg url "${ACTION_RUN_URL}" \
              '{event_type: "developer-notification", client_payload: {github_login: $actor, message: ("Your changes from `preview` have been synced to `main` in vertesia/llumiverse. See the <" + $url + "|Action run>.")}}')"

  notify_conflict:
    name: Notify developer of conflict PR
    needs: sync
    if: ${{ needs.sync.outputs.pr_number != '0' }}
    runs-on: ubuntu-latest
    # Scopes the cross-repo dispatch token to a dedicated environment.
    environment: build
    steps:
      - name: Notify studio for Slack notification
        env:
          STUDIO_DISPATCH_TOKEN: ${{ secrets.STUDIO_DISPATCH_TOKEN }}
          NEEDS_SYNC_OUTPUTS_PR_URL: ${{ needs.sync.outputs.pr_url }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${STUDIO_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --fail-with-body \
            https://api.github.com/repos/vertesia/studio/dispatches \
            -d "$(jq -nc \
              --arg actor "${GITHUB_ACTOR}" \
              --arg url "${NEEDS_SYNC_OUTPUTS_PR_URL}" \
              '{event_type: "developer-notification", client_payload: {github_login: $actor, message: ("Your changes from `preview` failed to sync to `main` in vertesia/llumiverse due to merge conflicts. Please resolve this PR: " + $url)}}')"

  cleanup:
    name: Cleanup temporary sync branch
    runs-on: ubuntu-latest
    needs:
      - sync
      - push
    # Always run cleanup except when there is a conflict PR that needs the branch to stay alive.
    if: ${{ always() && needs.sync.outputs.should_cleanup != 'false' && needs.push.result == 'success' }}
    permissions:
      contents: write # required for deleting the temporary sync branch
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # Fetch all because we need to access info from different branches
          fetch-tags: false
          persist-credentials: false

      - name: Cleanup temporary branch
        env:
          NEEDS_SYNC_OUTPUTS_SYNC_REF: ${{ needs.sync.outputs.sync_ref }}
        run: |
          set -x

          TEMP_BRANCH="${NEEDS_SYNC_OUTPUTS_SYNC_REF}"
          git branch -D "$TEMP_BRANCH" || true # Ignore if branch does not exist
          git push origin --delete "$TEMP_BRANCH" || true # Ignore if branch does not exist
