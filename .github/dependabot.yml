version: 2
updates:
  # Actions are pinned to commit SHAs; Dependabot updates the SHA + version comment.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7
